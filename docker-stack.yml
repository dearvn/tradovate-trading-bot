version: '3.7'

services:
  tradovate-redis:
    image: redis:6.0
    networks:
      - ingress
    volumes:
      - '/data/tradovate/redis:/data/redis'
      - '/data/tradovate/redis/redis.conf:/usr/local/etc/redis/redis.conf'
    deploy:
      mode: global
    ports:
      - 6379:6379
    command: redis-server /usr/local/etc/redis/redis.conf

  tradovate-postgres:
    image: postgres:15
    networks:
      - ingress
    volumes:
      - '/data/tradovate/postgres:/var/lib/postgresql/data'
    deploy:
      mode: global
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: tradovate_bot
      POSTGRES_USER: tradovate
      POSTGRES_PASSWORD: tradovate_pass

  tradovate-redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    networks:
      - ingress
    ports:
      - 8082:8081
    environment:
      REDIS_HOST: 'tradovate-redis'
      REDIS_PORT: 6379
      REDIS_PASSWORD:
    deploy:
      mode: global

  tradovate-bot:
    image: chrisleekr/tradovate-trading-bot:latest
    networks:
      - ingress
    environment:
      TRADOVATE_LIVE_API_KEY: ''
      TRADOVATE_LIVE_SECRET_KEY: ''
      TRADOVATE_TEST_API_KEY: ''
      TRADOVATE_TEST_SECRET_KEY: ''
      TRADOVATE_MODE: 'live'
      TRADOVATE_TZ: 'Europe/Berlin'
      TRADOVATE_SLACK_ENABLED: 'false'
      TRADOVATE_JOBS_ALIVE_ENABLED: 'true'
      TRADOVATE_JOBS_TRAILING_TRADE_ENABLED: 'true'
      TRADOVATE_JOBS_TRAILING_TRADE_SYMBOLS:
        '["MNQZ2", "NQZ2", "MESZ2", "ESZ2"]'
      TRADOVATE_POSTGRES_HOST: 'tradovate-postgres'
      TRADOVATE_POSTGRES_PORT: 5432
      TRADOVATE_POSTGRES_DATABASE: 'tradovate_bot'
      TRADOVATE_POSTGRES_USER: 'tradovate'
      TRADOVATE_POSTGRES_PASSWORD: 'tradovate_pass'
      TRADOVATE_LOCAL_TUNNEL_ENABLED: 'false'
      REDIS_HOST: 'tradovate-redis'
      REDIS_PORT: 6379
      REDIS_PASSWORD:
    ports:
      - 8080:80
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
    deploy:
      mode: global

networks:
  ingress:
    driver: bridge
    attachable: true
  kern-frontend:
    driver: bridge
    attachable: true

volumes:
  redis_data:
    external: true
  postgres_data:
    external: true
